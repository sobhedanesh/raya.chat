<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>پیام‌رسان ساده</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* کانتینر اصلی - شیشه‌ای (همون چیزی که گفتی) */
        .chat-container {
            width: 90%;
            max-width: 500px;
            height: 85vh;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* هدر */
        .chat-header {
            padding: 20px;
            background: rgba(255,255,255,0.2);
            border-bottom: 1px solid rgba(255,255,255,0.2);
            text-align: center;
        }

        .chat-header h1 {
            font-size: 1.4rem;
            font-weight: 600;
            color: white;
            text-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .chat-header p {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.8);
            margin-top: 5px;
        }

        /* بخش پیام‌ها */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* استایل پیام‌ها */
        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 20px;
            word-wrap: break-word;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-left {
            background: rgba(255,255,255,0.25);
            backdrop-filter: blur(4px);
            color: white;
            align-self: flex-start;
            border-bottom-left-radius: 5px;
        }

        .message-right {
            background: #007aff;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .message-text {
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .message-time {
            font-size: 0.65rem;
            opacity: 0.7;
            margin-top: 5px;
            text-align: left;
        }

        /* پیام سیستم */
        .system-message {
            text-align: center;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.6);
            margin: 8px 0;
        }

        /* بخش عکس و ویس */
        .media-message {
            max-width: 200px;
            border-radius: 16px;
            margin-top: 5px;
        }

        .media-message img {
            width: 100%;
            border-radius: 12px;
            cursor: pointer;
        }

        audio {
            width: 180px;
            height: 35px;
            border-radius: 20px;
            margin-top: 5px;
        }

        /* نوار پایین ورودی */
        .input-area {
            padding: 15px;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            border-top: 1px solid rgba(255,255,255,0.2);
        }

        .input-field {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 25px;
            background: rgba(255,255,255,0.2);
            color: white;
            font-size: 0.9rem;
            outline: none;
        }

        .input-field::placeholder {
            color: rgba(255,255,255,0.6);
        }

        button {
            background: #007aff;
            border: none;
            padding: 10px 18px;
            border-radius: 25px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
        }

        button:hover {
            background: #005fc1;
            transform: scale(0.96);
        }

        .icon-btn {
            background: rgba(255,255,255,0.2);
            font-size: 1.2rem;
            padding: 8px 12px;
        }

        .file-input {
            display: none;
        }

        /* اسکرول بار */
        .messages-area::-webkit-scrollbar {
            width: 5px;
        }

        .messages-area::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.4);
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <h1>📱 پیام‌رسان چرتی</h1>
        <p>فاقد سرور، فقط نمایشی | ارسال عکس و ویس</p>
    </div>

    <div class="messages-area" id="messagesArea">
        <div class="system-message">💬 به چرت‌ترین پیام‌رسان خوش اومدی</div>
        <div class="system-message">📡 این پیام‌ها در جایی ذخیره نمی‌شن</div>
    </div>

    <div class="input-area">
        <input type="text" id="messageInput" class="input-field" placeholder="پیامت رو بنویس..." autocomplete="off">
        
        <label for="imageInput" class="icon-btn" style="cursor:pointer;">🖼️</label>
        <input type="file" id="imageInput" class="file-input" accept="image/*">
        
        <label for="audioInput" class="icon-btn" style="cursor:pointer;">🎤</label>
        <input type="file" id="audioInput" class="file-input" accept="audio/*">
        
        <button id="sendBtn">📨</button>
    </div>
</div>

<script>
    // عناصر DOM
    const messagesArea = document.getElementById('messagesArea');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const imageInput = document.getElementById('imageInput');
    const audioInput = document.getElementById('audioInput');

    // تابع دریافت زمان
    function getCurrentTime() {
        const now = new Date();
        return `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
    }

    // تابع اضافه کردن پیام متنی (راست: من | چپ: طرف مقابل)
    function addMessage(text, isMe = true) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${isMe ? 'message-right' : 'message-left'}`;
        
        const textSpan = document.createElement('div');
        textSpan.className = 'message-text';
        textSpan.innerText = text;
        
        const timeSpan = document.createElement('div');
        timeSpan.className = 'message-time';
        timeSpan.innerText = getCurrentTime();
        
        messageDiv.appendChild(textSpan);
        messageDiv.appendChild(timeSpan);
        messagesArea.appendChild(messageDiv);
        scrollToBottom();
    }

    // تابع اضافه کردن پیام با عکس
    function addImageMessage(imageUrl, isMe = true) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${isMe ? 'message-right' : 'message-left'}`;
        
        const img = document.createElement('img');
        img.src = imageUrl;
        img.className = 'media-message';
        img.style.maxWidth = '180px';
        img.style.borderRadius = '12px';
        img.style.cursor = 'pointer';
        img.onclick = () => window.open(imageUrl, '_blank');
        
        const timeSpan = document.createElement('div');
        timeSpan.className = 'message-time';
        timeSpan.innerText = getCurrentTime();
        
        messageDiv.appendChild(img);
        messageDiv.appendChild(timeSpan);
        messagesArea.appendChild(messageDiv);
        scrollToBottom();
    }

    // تابع اضافه کردن پیام صوتی
    function addAudioMessage(audioUrl, isMe = true) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${isMe ? 'message-right' : 'message-left'}`;
        
        const audio = document.createElement('audio');
        audio.controls = true;
        audio.src = audioUrl;
        audio.className = 'media-message';
        
        const timeSpan = document.createElement('div');
        timeSpan.className = 'message-time';
        timeSpan.innerText = getCurrentTime();
        
        messageDiv.appendChild(audio);
        messageDiv.appendChild(timeSpan);
        messagesArea.appendChild(messageDiv);
        scrollToBottom();
    }

    // اسکرول به پایین
    function scrollToBottom() {
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    // ارسال پیام متنی
    function sendTextMessage() {
        const text = messageInput.value.trim();
        if (text === '') return;
        
        // نمایش پیام من
        addMessage(text, true);
        
        // شبیه‌سازی پاسخ خودکار (چرت و پرت)
        setTimeout(() => {
            const autoReplies = [
                "🤡 خودتی؟", "😂 چرند گفتی", "👍 آفرین", "🤖 ربات نیستم ها", 
                "📡 پیامت رسید", "💩 چرت و پرت", "🎉 چه جالب", "😴 خسته‌ام جواب ندم"
            ];
            const randomReply = autoReplies[Math.floor(Math.random() * autoReplies.length)];
            addMessage(randomReply, false);
        }, 800);
        
        messageInput.value = '';
        messageInput.focus();
    }

    // تبدیل فایل به URL و نمایش
    function handleImageUpload(file) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            addImageMessage(e.target.result, true);
            // پاسخ تصادفی طرف مقابل برای عکس
            setTimeout(() => {
                const replies = ["📸 قشنگه", "🖼️ چه خبر", "🤩 عالیه", "😅 چرت", "👍 اوکی"];
                const random = replies[Math.floor(Math.random() * replies.length)];
                addMessage(random, false);
            }, 1000);
        };
        reader.readAsDataURL(file);
    }

    function handleAudioUpload(file) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            addAudioMessage(e.target.result, true);
            setTimeout(() => {
                const replies = ["🎧 گوش کردم", "🗣️ جالبه", "🔊 چی گفتی؟", "😂 خنده دار"];
                const random = replies[Math.floor(Math.random() * replies.length)];
                addMessage(random, false);
            }, 1200);
        };
        reader.readAsDataURL(file);
    }

    // رویدادها
    sendBtn.addEventListener('click', sendTextMessage);
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendTextMessage();
    });
    
    imageInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
            handleImageUpload(e.target.files[0]);
        }
        imageInput.value = ''; // ریست برای انتخاب دوباره
    });
    
    audioInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
            handleAudioUpload(e.target.files[0]);
        }
        audioInput.value = '';
    });

    // پیام خوشامد اضافه
    setTimeout(() => {
        addMessage("سلام چرتی؟ چیکار داری؟", false);
    }, 500);
</script>
</body>
</html>
